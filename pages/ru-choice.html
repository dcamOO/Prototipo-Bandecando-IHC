<style>
    .choice-view {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px var(--spacing-main) 30px;
        background-color: var(--bg-app);
    }

    .form-logo {
        width: 120px;
        height: auto;
        margin-bottom: 20px;
    }

    .choice-title {
        color: var(--green-text);
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 24px;
        text-align: center;
    }

    .choice-card {
        width: 100%;
        background-color: transparent;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-card);
        padding: 24px 20px;
        margin-bottom: 30px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .ru-option-btn {
        width: 100%;
        background-color: #ffffff;
        border: none;
        padding: 20px 16px;
        border-radius: 12px;
        text-align: left;
        font-size: 1rem;
        color: var(--text-main);
        box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        cursor: pointer;
        transition: transform 0.1s, background-color 0.2s;
    }

    .ru-option-btn:active {
        transform: scale(0.98);
        background-color: #f0f0f0;
    }

    .bottom-brand {
        margin-top: auto;
        color: var(--green-logo);
        font-size: 1.8rem;
        font-weight: 700;
    }
</style>

<div class="choice-view">
    <img src="assets/logo.png" alt="Logo Bandecando" class="form-logo">
    
    <h1 class="choice-title">Escolha um Bandejão</h1>

    <div class="choice-card">
        <button class="ru-option-btn" onclick="window.chooseRU('Restaurante Setorial I')">Restaurante Setorial I</button>
        <button class="ru-option-btn" onclick="window.chooseRU('Restaurante Setorial II')">Restaurante Setorial II</button>
        <button class="ru-option-btn" onclick="window.chooseRU('Restaurante Saúde e Direito')">Restaurante Saúde e Direito</button>
        <button class="ru-option-btn" onclick="window.chooseRU('Restaurante Setorial ICA')">Restaurante Setorial ICA</button>
    </div>

    <div class="bottom-brand">Bandecando</div>
</div>

<script>
    window.chooseRU = function(nomeRU) {
        // Salva a escolha no navegador do usuário
        localStorage.setItem('bandecando_selected_ru', nomeRU);
        // Navega para o dashboard
        nav('dashboard');
    };
</script>
