<style>
    .dashboard-view {
        padding: var(--spacing-main);
        display: flex;
        flex-direction: column;
        height: 100%;
        padding-bottom: 40px;
    }

    .brand-header {
        text-align: center;
        margin-top: 20px;
        margin-bottom: 30px;
    }

    .brand-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 2rem;
        font-weight: 700;
        color: var(--green-logo);
    }

    .dashboard-logo-img {
        width: 120px;
        height: auto;
        object-fit: contain;
    }

    .brand-subtitle {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin-top: 8px;
        font-weight: 400;
    }

    .modern-card {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 24px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .card-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 16px;
    }

    .btn-outline {
        width: 100%;
        padding: 14px;
        border: 1px solid #ced4da;
        background-color: transparent;
        border-radius: 12px;
        font-weight: 600;
        font-size: 1rem;
        color: var(--text-main);
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        margin-top: 16px;
    }

    .btn-outline:active { background-color: #f8f9fa; }
    .btn-outline.success { border-color: var(--green-primary); color: var(--green-primary); background-color: rgba(43, 147, 72, 0.05); }

    .queue-status-display { display: flex; align-items: flex-start; gap: 12px; }
    .status-dot { width: 16px; height: 16px; border-radius: 50%; background-color: #ffb703; margin-top: 5px; flex-shrink: 0; }
    .queue-info h3 { font-size: 1.2rem; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
    .queue-info p { font-size: 0.95rem; color: #6c757d; }

    .queue-dropdown { display: none; flex-direction: column; gap: 8px; margin-top: 16px; }
    .queue-dropdown.active { display: flex; animation: fadeInDown 0.3s ease forwards; }

    .dropdown-item {
        background-color: #ffffff; border-radius: 12px; padding: 14px 16px;
        display: flex; justify-content: space-between; align-items: center;
        font-weight: 600; font-size: 1rem; cursor: pointer; border: 1px solid var(--border-color);
    }
    .dropdown-item:active { transform: scale(0.98); background-color: #f8f9fa; }

    .color-mp { color: #2b9348; } .color-p { color: #38b000; }
    .color-m { color: #ffb703; } .color-l { color: #fb8500; } .color-ml { color: #d00000; }

    .menu-short p { font-size: 1rem; color: #495057; margin-bottom: 6px; }
    .menu-short strong { color: var(--text-main); }

    .menu-day-label { font-size: 0.85rem; color: var(--text-muted); margin: -8px 0 14px; }
    .day-selector { display: flex; gap: 6px; margin-bottom: 16px; }
    .day-chip {
        flex: 1; padding: 8px 4px; border-radius: 10px;
        border: 1px solid var(--border-color); background: #fff;
        color: var(--text-muted); font-size: 0.85rem; font-weight: 600;
        cursor: pointer; transition: all 0.2s;
        display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .day-chip-date { font-size: 0.7rem; font-weight: 600; opacity: 0.85; }
    .day-chip.active { border-color: var(--green-primary); background: #d8f3dc; color: var(--green-primary); }
    .day-chip:active { transform: scale(0.97); }

    .menu-full { display: none; flex-direction: column; gap: 16px; animation: fadeInDown 0.3s ease forwards; }
    .menu-full.active { display: flex; }

    .menu-item-group h4 { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 6px; }
    .menu-item-group p { font-size: 0.95rem; color: #6c757d; margin-bottom: 8px; }
    .menu-divider { height: 1px; background-color: #f1f3f5; margin: 4px 0; }

    /* Cada alimento numa linha; a tag de restrição fica colada ao item específico */
    .menu-item-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .menu-item-line { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; font-size: 0.95rem; line-height: 1.3; }
    .menu-item-name { color: #495057; }

    .tags-container { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { padding: 4px 10px; border-radius: 16px; font-size: 0.75rem; font-weight: 700; }
    .tag-blue { background-color: #e7f5ff; color: #1971c2; }
    .tag-yellow { background-color: #fff9db; color: #b08800; }

    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    /* Barra de ação fixa no rodapé: garante que "Encontre companhia" fique
       sempre visível, mesmo em telas pequenas onde o conteúdo exige rolagem. */
    .action-container {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        position: sticky;
        bottom: 0;
        padding: 14px 0 6px;
        background: var(--bg-app);
        box-shadow: 0 -10px 18px -10px rgba(0,0,0,0.18);
    }

    .btn-back {
        position: absolute;
        left: 14px;
        top: 24px;
        background: none;
        border: none;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 50%;
        z-index: 10;
        transition: background-color 0.2s;
    }
    .btn-back:active { background-color: #e9ecef; }
    .btn-back svg {
        width: 24px; height: 24px;
        stroke: var(--text-main); stroke-width: 2.2;
        fill: none; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Botão "Meus grupos": cinza/desabilitado até existir ao menos 1 grupo criado */
    .btn-meus-grupos {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: var(--radius-btn);
        font-size: 1.05rem;
        font-weight: 600;
        background-color: #e0e0e0;
        color: #9e9e9e;
        cursor: not-allowed;
        transition: all 0.2s;
    }
    .btn-meus-grupos.enabled {
        background-color: var(--green-text);
        color: #ffffff;
        cursor: pointer;
    }
    .btn-meus-grupos.enabled:active { transform: scale(0.98); opacity: 0.9; }
</style>

<div class="dashboard-view">

    <button class="btn-back" onclick="nav('ru-choice')" aria-label="Trocar de RU">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>

    <header class="brand-header">
        <div class="brand-logo">
            <img src="assets/logo.png" alt="Logo Bandecando" class="dashboard-logo-img">
        </div>
        <p class="brand-subtitle" id="dashboard-header-subtitle">Carregando...</p>
    </header>

    <section class="modern-card">
        <h2 class="card-title">Monitor de Fila</h2>
        <div class="queue-status-display">
            <div class="status-dot"></div>
            <div class="queue-info">
                <h3>Média (15-25 min)</h3>
                <p>Atualizado há 5 min</p>
            </div>
        </div>

        <button id="btn-report-queue" class="btn-outline" onclick="window.toggleQueueDropdown()">
            Reportar fila atual
        </button>

        <div id="queue-dropdown" class="queue-dropdown">
            <div class="dropdown-item color-mp" onclick="window.submitQueueReport()">
                Muito pequena <span style="color: black;">↓</span>
            </div>
            <div class="dropdown-item color-p" onclick="window.submitQueueReport()">
                Pequena <span style="color: black;">↓</span>
            </div>
            <div class="dropdown-item color-m" onclick="window.submitQueueReport()">
                Média <span style="color: black;">↓</span>
            </div>
            <div class="dropdown-item color-l" onclick="window.submitQueueReport()">
                Longa <span style="color: black;">↓</span>
            </div>
            <div class="dropdown-item color-ml" onclick="window.submitQueueReport()">
                Muito longa <span style="color: black;">↓</span>
            </div>
        </div>
    </section>

    <section class="modern-card">
        <h2 class="card-title">Cardápio</h2>
        <p class="menu-day-label" id="menu-day-label"></p>

        <div class="day-selector" id="day-selector"></div>

        <div id="menu-short" class="menu-short"></div>
        <div id="menu-full" class="menu-full"></div>

        <button id="btn-toggle-menu" class="btn-outline" onclick="window.toggleMenu()">
            Ver cardápio completo
        </button>
    </section>

    <div class="action-container">
        <button class="btn-primary" onclick="nav('grupos')">Encontre companhia</button>
        <button id="btn-meus-grupos" class="btn-meus-grupos" onclick="window.goMeusGrupos()">Meus grupos</button>
    </div>

</div>

<script>
    // Configura o cabeçalho ao carregar a página
    window.initDashboard = function() {
        // Pega o RU escolhido ou um fallback de segurança
        const ruSelecionado = localStorage.getItem('bandecando_selected_ru') || 'Restaurante Setorial I';
        
        // Arrays para pegar o dia da semana atual
        const diasSemana = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
        const hoje = diasSemana[new Date().getDay()];

        // Atualiza a interface
        document.getElementById('dashboard-header-subtitle').innerText = `${ruSelecionado} • ${hoje}`;

        // Habilita "Meus grupos" se o usuário criou OU entrou em algum grupo
        const temGrupos = window.BandecandoData.hasAnyGroup();
        const btnMeus = document.getElementById('btn-meus-grupos');
        btnMeus.classList.toggle('enabled', temGrupos);

        // Cardápio: datas da semana atual (Seg–Sex; no fim de semana, próxima semana)
        window.WEEK_DATES = window.BandecandoData.weekDatesForMenu();
        // Cardápio: começa no dia de hoje
        window.SELECTED_DAY = window.BandecandoData.todayDayKey();
        window.renderDaySelector();
        window.renderMenu();
    };

    // Seletor de dia do cardápio
    window.renderDaySelector = function() {
        const D = window.BandecandoData;
        const box = document.getElementById('day-selector');
        box.innerHTML = '';
        D.MENU_DAYS.forEach(d => {
            const chip = document.createElement('button');
            chip.className = 'day-chip' + (d.key === window.SELECTED_DAY ? ' active' : '');
            const dm = D.formatDayMonth(window.WEEK_DATES[d.key]);
            chip.innerHTML = `${d.label}<span class="day-chip-date">${dm}</span>`;
            chip.onclick = () => { window.SELECTED_DAY = d.key; window.renderDaySelector(); window.renderMenu(); };
            box.appendChild(chip);
        });
    };

    // Renderiza o cardápio do RU selecionado para o dia escolhido
    window.renderMenu = function() {
        const D = window.BandecandoData;
        const ru = localStorage.getItem('bandecando_selected_ru') || D.RUS[0];
        const dia = D.MENU_DAYS.find(d => d.key === window.SELECTED_DAY);
        const m = D.getMenu(ru, window.SELECTED_DAY);

        const dataBR = D.formatDateBR(window.WEEK_DATES[window.SELECTED_DAY]);
        document.getElementById('menu-day-label').innerText =
            dia ? `${dia.full} • ${dataBR}` : '';

        // Tags presas ao ITEM individual (não à categoria) -> remove a ambiguidade
        // de "qual alimento da categoria tem a restrição".
        function itemTags(arr) {
            if (!arr || !arr.length) return '';
            return arr.map(t =>
                `<span class="tag ${t.indexOf('Contém') === 0 ? 'tag-yellow' : 'tag-blue'}">${t}</span>`).join('');
        }
        function groupBlock(g) {
            const items = g.items.map(it =>
                `<li class="menu-item-line"><span class="menu-item-name">${it.name}</span>${itemTags(it.tags)}</li>`
            ).join('');
            return `<div class="menu-item-group"><h4>${g.label}</h4><ul class="menu-item-list">${items}</ul></div>`;
        }

        document.getElementById('menu-short').innerHTML =
            `<p><strong>Principal:</strong> ${m.principal}</p>
             <p><strong>Vegetariano:</strong> ${m.vegetariano}</p>`;

        document.getElementById('menu-full').innerHTML =
            m.groups.map((g, i) =>
                groupBlock(g) + (i < m.groups.length - 1 ? '<div class="menu-divider"></div>' : '')
            ).join('');
    };

    window.goMeusGrupos = function() {
        if (window.BandecandoData.hasAnyGroup()) nav('meus-grupos');
    };

    // Fila: Expande ou recolhe as opções
    window.toggleQueueDropdown = function() {
        const dropdown = document.getElementById('queue-dropdown');
        dropdown.classList.toggle('active');
    };

    // Fila: Confirma o envio e dá feedback ao usuário
    window.submitQueueReport = function() {
        const dropdown = document.getElementById('queue-dropdown');
        const btn = document.getElementById('btn-report-queue');

        dropdown.classList.remove('active');

        const originalText = "Reportar fila atual";
        btn.innerText = 'Reporte recebido! ✅';
        btn.classList.add('success');

        setTimeout(() => {
            btn.innerText = originalText;
            btn.classList.remove('success');
        }, 3000);
    };

    // Cardápio: Alterna entre visão resumida e completa
    window.toggleMenu = function() {
        const shortMenu = document.getElementById('menu-short');
        const fullMenu = document.getElementById('menu-full');
        const btn = document.getElementById('btn-toggle-menu');

        if (fullMenu.classList.contains('active')) {
            fullMenu.classList.remove('active');
            shortMenu.style.display = 'block';
            btn.innerText = 'Ver cardápio completo';
        } else {
            fullMenu.classList.add('active');
            shortMenu.style.display = 'none';
            btn.innerText = 'Recolher cardápio';
        }
    };

    // Chama a inicialização automaticamente
    window.initDashboard();
</script>
